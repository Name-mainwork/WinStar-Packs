name: Build files.json

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate files.json
        run: |
          find packs -type f | sort | jq -R -s -c 'split("\n") | map(select(length > 0))' > files.json
          cat files.json

      - name: Commit if changed
        run: |
          if git diff --quiet -- files.json; then
            echo "files.json без изменений"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add files.json
            git commit -m "chore: update files.json [skip ci]"
            git push
          fi
